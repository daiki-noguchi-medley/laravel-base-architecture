# Laravel 用 nginx 設定
# ドキュメントルートは Laravel 標準の public/
# php-fpm (app:9000) に fastcgi で繋ぐ

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # レスポンスの文字コード
    charset utf-8;

    # アップロードサイズ上限 (PHP 側 post_max_size と揃える)
    client_max_body_size 100M;

    # セキュリティヘッダ
    # ※ nginx の add_header は location 内で書くと継承しないため、
    #   add_header を含む全 location で snippet を include しなおす。
    include /etc/nginx/snippets/security-headers.conf;

    # Laravel のフロントコントローラパターン
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ------------------------------------------------------------------------
    # 静的アセット (Vite ビルド成果物は contenthash 付きなので 1 年 cache 安全)
    #   - public/build/assets/app-xxxxxxxx.js のようにファイル名にハッシュが入る
    #   - immutable で「変更されない」とブラウザに通知 → 再検証も飛ばす
    # ------------------------------------------------------------------------
    location ~* \.(css|js|map|woff|woff2|svg|png|jpg|jpeg|gif|webp|ico)$ {
        include /etc/nginx/snippets/security-headers.conf;
        # expires と add_header Cache-Control を併用すると Cache-Control 行が
        # 二重に出るので、add_header に max-age を含めて 1 行にまとめる
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # favicon / robots.txt はログ汚さない + 軽くキャッシュ
    # ------------------------------------------------------------------------
    location = /favicon.ico {
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        log_not_found off;
        expires 30d;
    }
    location = /favicon.svg {
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        log_not_found off;
        expires 30d;
    }
    location = /robots.txt {
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        log_not_found off;
        expires 1d;
    }

    error_page 404 /index.php;

    # PHP は php-fpm (compose の service 名: app) に転送
    # (このブロック内で add_header を書かないので server の include が継承される)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # ドット始まりのファイルを拒否 (.well-known は許可)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
