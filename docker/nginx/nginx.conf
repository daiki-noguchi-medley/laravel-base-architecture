# nginx メイン設定 — Asia/Tokyo + gzip + Brotli 圧縮

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx/nginx.pid;

# apk add nginx-mod-http-brotli で /etc/nginx/modules/ に load_module 設定ファイル (*.conf) が
# 配置されるので、それを include する (load_module は main context でしか書けない)
include /etc/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ----------------------------------------------------------------------------
    # gzip 圧縮 (フォールバック、Brotli 非対応ブラウザ向け)
    # ----------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ----------------------------------------------------------------------------
    # Brotli 圧縮 (gzip より 10〜20% 圧縮率高、モダンブラウザは標準対応)
    #   - クライアントが Accept-Encoding: br を送ったときだけ使われる
    #   - 非対応ブラウザは自動で gzip にフォールバック
    # ----------------------------------------------------------------------------
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # サーバー block (vhost)
    include /etc/nginx/http.d/*.conf;
}
