# セキュリティヘッダ snippet
#   nginx の `add_header` は location 内で書くと server block で書いたものが継承されない
#   そのため、ヘッダを追加したい全 location でこのファイルを include する。
#
# 使い方:
#   server {
#       include /etc/nginx/snippets/security-headers.conf;   # server block 直下
#       location ~* \.(css|js|...)$ {
#           include /etc/nginx/snippets/security-headers.conf;  # add_header を含む location でも include
#           ...
#       }
#   }

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# HTTPS 環境なら HSTS も追加:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
