; PHP 設定 (日本語化 + Laravel 用チューニング)

[Date]
; 標準タイムゾーンは Asia/Tokyo
date.timezone = Asia/Tokyo

[mbstring]
; 日本語マルチバイト関連
; ※ PHP 8.2+ で http_input / http_output / internal_encoding は deprecated。
;    内部エンコーディングは [PHP] の default_charset で制御する。
mbstring.language = Japanese
mbstring.encoding_translation = Off
mbstring.detect_order = UTF-8,SJIS,EUC-JP,JIS,ASCII

[PHP]
default_charset = UTF-8

; メモリ・サイズ系 (Laravel + Composer 想定でやや大きめ)
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_vars = 5000

; バージョン情報を隠す
expose_php = Off

; エラー表示は開発用 (本番では Off にすること)
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
; 開発用: ファイル変更を毎リクエスト検出
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1
