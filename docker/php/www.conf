; PHP-FPM プール設定
[www]
user = www-data
group = www-data

; nginx コンテナ (web) から TCP で接続させる
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; 動的プロセス管理 (開発用の小さめ設定)
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; 環境変数を子プロセスに引き継ぐ (TZ / LANG 等を効かせる)
clear_env = no

; ----------------------------------------------------------------------------
; ログ集約: 全部 stderr に流して docker compose logs / Fluent Bit (firelens) で拾う
; ----------------------------------------------------------------------------
; FPM 自体の error_log は [global] セクション専用設定なので、ここ ([www] プール) では
; 書かない (書くと "unknown entry 'error_log'" で FPM が起動失敗する)。
; 公式 PHP image の /usr/local/etc/php-fpm.d/zz-docker.conf が [global] で
;   error_log = /proc/self/fd/2
; を既に設定しているので、何もしなくても FPM の error は stderr に出る。

; FPM の access ログ (どの URL が何 ms 掛かったか)。
; nginx の access_log と Laravel logging があれば十分だが、観測性のため stderr に出しておく。
access.log = /proc/self/fd/2
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d ms %{kilo}M KB %C%%"

; slowlog: 5 秒以上掛かったリクエストのバックトレースを stderr に出す
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; ワーカーの echo / var_dump / Throwable の stderr 出力をコンテナログに流す
catch_workers_output = yes
decorate_workers_output = no
