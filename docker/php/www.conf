; PHP-FPM プール設定
[www]
user = www-data
group = www-data

; nginx コンテナ (web) から TCP で接続させる
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; 動的プロセス管理 (開発用の小さめ設定)
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; 環境変数を子プロセスに引き継ぐ (TZ / LANG 等を効かせる)
clear_env = no

; ワーカーの stdout / stderr をコンテナログに流す
catch_workers_output = yes
decorate_workers_output = no
